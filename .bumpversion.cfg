[bumpversion]
current_version = 1.33.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = tunnel-manager[mcp]>={current_version}
replace = tunnel-manager[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = tunnel-manager[agent]>={current_version}
replace = tunnel-manager[agent]>={new_version}

[bumpversion:file:tunnel_manager/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:tunnel_manager/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:tunnel_manager/tunnel_manager.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
