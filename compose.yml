---
services:
  tunnel-manager-agent:
    image: docker.io/knucklessg1/tunnel-manager:latest
    #    build:
    #      context: . # Debug
    #      dockerfile: debug.Dockerfile
    container_name: tunnel-manager-agent
    hostname: tunnel-manager-agent
    command: [ "tunnel-manager-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    volumes:
      - ~/.ssh:/root/.ssh:ro
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9912"
      - "TRANSPORT=stdio"
      - "TUNNEL_REMOTE_HOST=${TUNNEL_REMOTE_HOST}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-nvidia/nemotron-3-super}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9912:9912"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9912/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
